<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F7F4EE">
<title>Budget Tracker — offline</title>
<link rel="icon" href="/assets/icon-192.png">
<style>
  html,body{height:100%;margin:0}
  body{
    background:#F7F4EE;color:#14130F;
    font-family:Georgia,'Times New Roman',serif;
    display:flex;align-items:center;justify-content:center;text-align:center;
    padding:24px;box-sizing:border-box;
  }
  .card{max-width:340px}
  .tile{width:72px;height:72px;border-radius:16px;background:#A8814C;margin:0 auto 22px;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:40px;color:#F7F4EE}
  h1{font-size:1.4rem;margin:0 0 10px;font-weight:700}
  p{margin:0 0 24px;color:#5c564a;line-height:1.55;font-size:1rem;
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif}
  button{
    background:#A8814C;color:#F7F4EE;border:0;border-radius:12px;
    padding:12px 24px;font-size:1rem;font-weight:600;cursor:pointer;
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  button:active{transform:translateY(1px)}
</style>
</head>
<body>
  <div class="card">
    <div class="tile">$</div>
    <h1>You're offline</h1>
    <p>Budget Tracker needs a connection to load your accounts. Check your internet and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
